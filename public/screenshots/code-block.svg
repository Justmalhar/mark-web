<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-label="Code block">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef9ee"/>
      <stop offset="1" stop-color="#eef1f7"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg3)"/>
  <g transform="translate(80 60)">
    <rect width="1440" height="880" rx="18" ry="18" fill="#fff" stroke="#dfe3eb"/>
    <rect width="1440" height="44" rx="18" ry="18" fill="#f3f5f9"/>
    <circle cx="26" cy="22" r="6.5" fill="#ff5f57"/>
    <circle cx="46" cy="22" r="6.5" fill="#febc2e"/>
    <circle cx="66" cy="22" r="6.5" fill="#28c840"/>
    <text x="720" y="27" text-anchor="middle" font-family="-apple-system,Inter,sans-serif" font-size="13" fill="#6e6e73">api.md — Edited</text>
    <g transform="translate(160 160)">
      <rect width="1120" height="280" rx="14" ry="14" fill="#f5f5f7"/>
      <g transform="translate(990 14)">
        <rect width="56" height="22" rx="11" ry="11" fill="#ffffff" stroke="#e5e8ee"/>
        <text x="28" y="16" text-anchor="middle" font-family="-apple-system,Inter,sans-serif" font-size="11" fill="#6e6e73">Python</text>
        <rect x="64" y="0" width="32" height="22" rx="11" ry="11" fill="#ffffff" stroke="#e5e8ee"/>
        <text x="80" y="16" text-anchor="middle" font-family="-apple-system,Inter,sans-serif" font-size="11" fill="#6e6e73">⧉</text>
      </g>
      <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="15">
        <text x="22" y="70"><tspan fill="#a626a4">def</tspan> <tspan fill="#4078f2">greet</tspan>(name: <tspan fill="#4078f2">str</tspan>) -&gt; <tspan fill="#4078f2">str</tspan>:</text>
        <text x="22" y="100">    <tspan fill="#a626a4">return</tspan> <tspan fill="#50a14f">f"Hello, {`{name}`}!"</tspan></text>
        <text x="22" y="130"/>
        <text x="22" y="160"><tspan fill="#a626a4">if</tspan> __name__ == <tspan fill="#50a14f">"__main__"</tspan>:</text>
        <text x="22" y="190">    <tspan fill="#e45649">print</tspan>(<tspan fill="#4078f2">greet</tspan>(<tspan fill="#50a14f">"Mark"</tspan>))</text>
      </g>
    </g>
    <text x="160" y="520" font-family="-apple-system,Inter,sans-serif" font-size="18" fill="#3a3a3c">Real syntax highlighting via highlight.js. Click the language badge to change languages.</text>
  </g>
</svg>
