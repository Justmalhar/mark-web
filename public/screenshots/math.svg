<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-label="KaTeX math">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4f0ff"/>
      <stop offset="1" stop-color="#eef1f7"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg4)"/>
  <g transform="translate(80 60)">
    <rect width="1440" height="880" rx="18" ry="18" fill="#fff" stroke="#dfe3eb"/>
    <rect width="1440" height="44" rx="18" ry="18" fill="#f3f5f9"/>
    <circle cx="26" cy="22" r="6.5" fill="#ff5f57"/>
    <circle cx="46" cy="22" r="6.5" fill="#febc2e"/>
    <circle cx="66" cy="22" r="6.5" fill="#28c840"/>
    <text x="720" y="27" text-anchor="middle" font-family="-apple-system,Inter,sans-serif" font-size="13" fill="#6e6e73">physics.md — Edited</text>
    <g font-family="-apple-system,Inter,sans-serif" fill="#1d1d1f">
      <text x="240" y="220" font-size="36" font-weight="700">Mass–energy equivalence</text>
      <text x="240" y="280" font-size="18" fill="#3a3a3c">Inline: <tspan font-family="ui-serif,Georgia,serif" font-style="italic">E = mc²</tspan> renders inline with KaTeX.</text>
      <g transform="translate(720 380)" font-family="ui-serif,Georgia,serif" font-style="italic">
        <text x="0" y="50" font-size="64" text-anchor="middle">E = mc²</text>
      </g>
      <text x="240" y="540" font-size="18" fill="#3a3a3c">Block math is centered, large, and saved as plain <tspan font-family="ui-monospace,Menlo,monospace">$$ … $$</tspan> in your file.</text>
      <g transform="translate(720 660)" font-family="ui-serif,Georgia,serif" font-style="italic">
        <text x="0" y="0" font-size="42" text-anchor="middle">∫</text>
        <text x="40" y="0" font-size="28" font-style="normal">−∞</text>
        <text x="0" y="60" font-size="28" font-style="normal">∞</text>
        <text x="100" y="20" font-size="34" text-anchor="middle">e</text>
        <text x="130" y="0" font-size="22">−x²</text>
        <text x="180" y="20" font-size="34"> dx = √π</text>
      </g>
    </g>
  </g>
</svg>
