<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-label="Edit mode">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fdf2f8"/>
      <stop offset="1" stop-color="#eef1f7"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg2)"/>
  <g transform="translate(80 60)">
    <rect width="1440" height="880" rx="18" ry="18" fill="#fff" stroke="#dfe3eb"/>
    <rect width="1440" height="44" rx="18" ry="18" fill="#f3f5f9"/>
    <circle cx="26" cy="22" r="6.5" fill="#ff5f57"/>
    <circle cx="46" cy="22" r="6.5" fill="#febc2e"/>
    <circle cx="66" cy="22" r="6.5" fill="#28c840"/>
    <text x="720" y="27" text-anchor="middle" font-family="-apple-system,Inter,sans-serif" font-size="13" fill="#6e6e73">sample.md — Edited</text>
    <g transform="translate(480 90)">
      <rect width="480" height="48" rx="24" ry="24" fill="#ffffff" stroke="#dfe3eb"/>
      <text x="240" y="30" text-anchor="middle" font-family="-apple-system,Inter,sans-serif" font-size="13" fill="#6e6e73">B  I  S  •  1.  ✓  ❝  { }  ▦  —  🔗  📷</text>
    </g>
    <g font-family="-apple-system,Inter,sans-serif" fill="#1d1d1f">
      <text x="240" y="240" font-size="40" font-weight="700">Editing your notes</text>
      <text x="240" y="290" font-size="18" fill="#3a3a3c">Click anywhere to start editing.  <tspan font-weight="700">Bold</tspan>, <tspan font-style="italic">italics</tspan>, lists, links — all live formatted.</text>
      <rect x="240" y="320" width="960" height="2" fill="#e5e8ee"/>
      <text x="240" y="370" font-size="24" font-weight="700">Inline editing</text>
      <text x="240" y="410" font-size="16" fill="#3a3a3c">- Type <tspan font-family="ui-monospace,Menlo,monospace">**bold**</tspan> and the bold turns into <tspan font-weight="700">bold</tspan> instantly.</text>
      <text x="240" y="440" font-size="16" fill="#3a3a3c">- Hit <tspan font-family="ui-monospace,Menlo,monospace">## </tspan>at the start of a line for a heading.</text>
      <text x="240" y="470" font-size="16" fill="#3a3a3c">- Paste a URL — it autolinks.</text>
    </g>
  </g>
</svg>
